<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMPUNG BLANGKON - NEO BRUTALISM PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f3f3;
            --accent: #ffdf00; 
            --blue: #2b59ff;
            --black: #000000;
            --white: #ffffff;
            --border: 4px solid #000000;
            --shadow: 8px 8px 0px #000000;
            --shadow-hover: 12px 12px 0px #000000;
        }

        /* Keyframes Animasi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: rotate(-3deg) translateY(0px); }
            50% { transform: rotate(-1deg) translateY(-10px); }
            100% { transform: rotate(-3deg) translateY(0px); }
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--black);
            padding: 20px;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            background: var(--blue);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 60px;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            max-width: 140px;
            border: var(--border);
            background: var(--white);
            padding: 10px;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
            box-shadow: 5px 5px 0px var(--black);
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            text-transform: uppercase;
            color: var(--white);
            -webkit-text-stroke: 1.5px var(--black);
            text-shadow: 6px 6px 0 var(--black);
            margin-bottom: 15px;
        }

        header p {
            background: var(--accent);
            display: inline-block;
            padding: 8px 20px;
            border: var(--border);
            font-weight: 900;
            text-transform: uppercase;
            transform: skew(-5deg);
            box-shadow: 4px 4px 0 #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            margin-bottom: 40px;
            overflow: hidden;
        }

        .section-header h2 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            background: var(--accent);
            display: inline-block;
            padding: 12px 24px;
            border: var(--border);
            box-shadow: 6px 6px 0 var(--black);
            transition: 0.3s;
        }

        .section-header h2:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0 var(--black);
        }

        /* GRID GALERI */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-bottom: 80px;
        }

        .card {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out both;
        }

        /* Animasi masuk bergantian (Staggered) */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card:hover {
            transform: translate(-8px, -8px);
            box-shadow: var(--shadow-hover);
            background-color: #fff9db;
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-bottom: var(--border);
            transition: 0.5s;
        }

        .card:hover img {
            filter: saturate(1.2);
        }

        .card-info {
            padding: 25px;
            background: var(--white);
            flex-grow: 1;
            transition: 0.3s;
        }

        .card:hover .card-info {
            background: transparent;
        }

        .card-info h3 {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        /* PETA SECTION */
        .map-section {
            margin: 80px 0;
            animation: fadeIn 1s ease-out;
        }

        .map-container {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            cursor: crosshair;
        }

        .map-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%);
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .map-container:hover img {
            filter: grayscale(0%) scale(1.05);
        }

        .map-label {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: var(--blue);
            color: white;
            padding: 15px 30px;
            border: var(--border);
            font-weight: 900;
            transform: rotate(-2deg);
            box-shadow: 5px 5px 0 #000;
            z-index: 2;
        }

        /* FOOTER */
        footer {
            border: var(--border);
            background: var(--black);
            color: var(--white);
            margin-top: 80px;
            padding: 60px 20px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: inset 0 10px 0 rgba(255,255,255,0.1);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { padding: 15px; }
            header { padding: 40px 15px; }
            .gallery-grid { gap: 25px; }
            .card:hover { transform: translate(-4px, -4px); }
            .map-label { position: relative; bottom: 0; right: 0; transform: none; margin: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <img src="kampung_blangkon/logo_id_blangkon.png" alt="Logo" class="logo">
        <h1>KAMPUNG BLANGKON</h1>
        <p>Potrojayan • Serengan • Surakarta</p>
    </header>

    <div class="container">
        
        <!-- PRODUK -->
        <div class="section-header">
            <h2>KOLEKSI PRODUK</h2>
        </div>
        <div class="gallery-grid">
            <div class="card">
                <img src="kampung_blangkon/blangkon_ksatria.png" alt="Blangkon Ksatria">
                <div class="card-info"><h3>KSATRIA</h3></div>
            </div>
            <div class="card">
                <img src="kampung_blangkon/blangkon_ngayogyakarta.png" alt="Blangkon Ngayogyakarta">
                <div class="card-info"><h3>NGAYOGYAKARTA</h3></div>
            </div>
            <div class="card">
                <img src="kampung_blangkon/blangkon_penganten.png" alt="Blangkon Penganten">
                <div class="card-info"><h3>PENGANTEN</h3></div>
            </div>
            <div class="card">
                <img src="kampung_blangkon/blangkon_perbawan.png" alt="Blangkon Perbawan">
                <div class="card-info"><h3>PERBAWAN</h3></div>
            </div>
        </div>

        <!-- PENGRAJIN -->
        <div class="section-header">
            <h2>INFO PENGRAJIN</h2>
        </div>
        <div class="gallery-grid">
            <div class="card">
                <img src="kampung_blangkon/daftar_pengrajin_blangkon.png" alt="Daftar Pengrajin 1">
                <div class="card-info"><h3>DAFTAR PENGRAJIN I</h3></div>
            </div>
            <div class="card">
                <img src="kampung_blangkon/daftar_pengrajin_blangkon2.png" alt="Daftar Pengrajin 2">
                <div class="card-info"><h3>DAFTAR PENGRAJIN II</h3></div>
            </div>
        </div>

        <!-- LOKASI -->
        <div class="map-section">
            <div class="section-header">
                <h2>LOKASI KAMI</h2>
            </div>
            <div class="map-container">
                <img src="kampung_blangkon/peta_kampung_blangkon.png" alt="Peta Lokasi Kampung Blangkon">
                <div class="map-label">MAPS POTROJAYAN</div>
            </div>
        </div>

    </div>

    <footer>
        KELURAHAN SERENGAN &copy; 2026<br>KAMPUNG BLANGKON SURAKARTA
    </footer>

</body>
</html>
